<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>불면증 해소기</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.app {
  width: 350px;
  height: 640px;
  background: #1e293b;
  border-radius: 25px;
  padding: 20px;
  color: white;
  overflow-y: auto;
}

.card {
  background: #334155;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  cursor: pointer;
}

button {
  margin-top: 10px;
  padding: 8px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  cursor: pointer;
}

input, textarea, select {
  width: 90%;
  margin-top: 10px;
  padding: 6px;
  border-radius: 8px;
  border: none;
}
</style>

</head>
<body>

<div class="app">
<h2>🌙 불면증 해소기</h2>
<div id="screen"></div>
</div>

<script>
let currentUser = null;
let audio;

// 시작
showLogin();

// 🔐 로그인
function showLogin() {
  document.getElementById("screen").innerHTML = `
    <h3>로그인</h3>
    <input id="id" placeholder="아이디">
    <input id="pw" type="password" placeholder="비밀번호">
    <button onclick="login()">로그인</button>
    <button onclick="showRegister()">회원가입</button>
  `;
}

// 회원가입
function showRegister() {
  document.getElementById("screen").innerHTML = `
    <h3>회원가입</h3>
    <input id="rid" placeholder="아이디">
    <input id="rpw" type="password" placeholder="비밀번호">
    <button onclick="register()">가입</button>
    <button onclick="showLogin()">← 로그인</button>
  `;
}

function register() {
  let id = rid.value;
  let pw = rpw.value;

  let users = JSON.parse(localStorage.getItem("users")) || [];
  if (users.find(u => u.id === id)) {
    alert("이미 있음");
    return;
  }

  users.push({id, pw});
  localStorage.setItem("users", JSON.stringify(users));
  alert("가입 완료!");
  showLogin();
}

function login() {
  let users = JSON.parse(localStorage.getItem("users")) || [];
  let user = users.find(u => u.id === id.value && u.pw === pw.value);

  if (!user) return alert("실패");

  currentUser = user.id;
  showHome();
}

// 🏠 홈
function showHome() {
  screen.innerHTML = `
    <h3>${currentUser}님 👋</h3>
    <div class="card" onclick="showRecommend()">😴 수면 추천</div>
    <div class="card" onclick="showMusic()">🎵 음악</div>
    <div class="card" onclick="showConsult()">🧠 상담</div>
    <div class="card" onclick="showHistory()">📊 기록</div>
    <button onclick="logout()">로그아웃</button>
  `;
}

function logout() {
  currentUser = null;
  stop();
  showLogin();
}

// 😴 추천
function showRecommend() {
  screen.innerHTML = `
    <div class="card" onclick="recommend('stress')">스트레스</div>
    <div class="card" onclick="recommend('tired')">피곤</div>
    <div class="card" onclick="recommend('normal')">보통</div>
    <button onclick="showHome()">←</button>
  `;
}

function recommend(s) {
  let m = s=="stress"?"피아노":s=="tired"?"빗소리":"로파이";
  let h = s=="stress"?"명상":"스트레칭";

  save(s,m,h);

  screen.innerHTML = `
    <p>${m} / ${h}</p>
    <button onclick="playDefault()">재생</button>
    <button onclick="showHome()">홈</button>
  `;
}

// 🎵 음악
function showMusic() {
  screen.innerHTML = `
    <select id="music">
      <option value="1">피아노</option>
      <option value="2">빗소리</option>
      <option value="3">로파이</option>
    </select>
    <button onclick="playMusic()">재생</button>
    <button onclick="stop()">정지</button>
    <button onclick="showHome()">←</button>
  `;
}

function playMusic() {
  let v = music.value;
  let url = v==1?"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3":
            v==2?"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3":
            "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3";
  play(url);
}

// 🧠 상담 (최강 버전)
function showConsult() {
  screen.innerHTML = `
    <textarea id="text" placeholder="고민 입력"></textarea>
    <button onclick="consult()">상담</button>
    <div id="res"></div>
    <button onclick="showHome()">←</button>
  `;
}

function consult() {
  let t = text.value;
  let res = [];

  if ((t.includes("스트레스")||t.includes("힘들")) && t.includes("잠")) {
    res=["스트레스 때문에 잠이 안 오죠 😔","생각을 내려놓고 쉬어보세요 🌙"];
  }
  else if (t.includes("스트레스")) {
    res=["쉬어도 괜찮아요 🌿","깊게 호흡해보세요 🧘"];
  }
  else if (t.includes("잠")) {
    res=["폰 멀리하세요 📵","규칙적인 수면 중요 ⏰"];
  }
  else if (t.includes("화")) {
    res=["자연스러운 감정이에요 😌","잠시 쉬어보세요"];
  }
  else if (t.includes("슬프")||t.includes("우울")) {
    res=["괜찮아요 🤍","혼자가 아니에요 💙"];
  }
  else if (t.includes("불안")) {
    res=["지금에 집중하세요 🌱","천천히 호흡하세요"];
  }
  else if (t.includes("시험")) {
    res=["노력은 배신 안해요 💪","조금씩 해요 📚"];
  }
  else if (t.includes("친구")) {
    res=["시간이 해결해요 ⏳","대화가 중요해요 💬"];
  }
  else {
    res=["오늘도 잘했어요 👍","편히 쉬세요 😌"];
  }

  let r = res[Math.floor(Math.random()*res.length)];
  document.getElementById("res").innerHTML = r;
}

// 📊 기록
function save(s,m,h) {
  let all = JSON.parse(localStorage.getItem("rec"))||{};
  if (!all[currentUser]) all[currentUser]=[];
  all[currentUser].push({s,m,h,time:new Date().toLocaleString()});
  localStorage.setItem("rec",JSON.stringify(all));
}

function showHistory() {
  let all = JSON.parse(localStorage.getItem("rec"))||{};
  let d = all[currentUser]||[];

  let html="<h3>기록</h3>";
  d.forEach(x=>{
    html+=`<div class="card">${x.s}/${x.m}/${x.time}</div>`;
  });

  screen.innerHTML = html+`<button onclick="showHome()">←</button>`;
}

// 🎵 재생
function play(url) {
  if (audio) audio.pause();
  audio=new Audio(url);
  audio.loop=true;
  audio.play();
}

function playDefault() {
  play("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
}

function stop() {
  if (audio) audio.pause();
}
</script>

</body>
</html>
</body>
</html>
