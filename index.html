<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>불면증 해소기</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --card: #334155;
      --card-hover: #475569;
      --accent: #38bdf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: rgba(148, 163, 184, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.15), transparent 30%),
        var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .app {
      width: min(100%, 360px);
      min-height: 640px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.45);
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .card {
      background: var(--card);
      padding: 16px;
      margin: 10px 0;
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .card:hover {
      background: var(--card-hover);
      transform: translateY(-1px);
    }

    .result,
    .history {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .summary {
      background: rgba(56, 189, 248, 0.08);
      border: 1px solid rgba(56, 189, 248, 0.18);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 16px 0;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      background: var(--accent);
      color: #082f49;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #cbd5e1;
      color: #0f172a;
    }

    .timer-box {
      display: flex;
      gap: 8px;
      margin: 12px 0 16px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: #0f172a;
      color: var(--text);
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 14px;
      margin-top: 10px;
    }

    .history-item {
      background: rgba(15, 23, 42, 0.45);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .history-item strong {
      display: block;
      margin-bottom: 6px;
    }

    .history-item small {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>오늘 밤 수면 도우미</h1>
    <p class="subtitle">현재 컨디션에 맞는 음악과 습관을 추천하고, 최근 추천 기록을 DB에 저장합니다.</p>

    <div id="main">
      <div class="card" onclick="recommend('stress')">지금 스트레스가 많아요</div>
      <div class="card" onclick="recommend('tired')">몸이 많이 지쳐 있어요</div>
      <div class="card" onclick="recommend('normal')">그냥 편안하게 자고 싶어요</div>
    </div>

    <div id="result" class="result"></div>

    <div class="history">
      <h3>최근 추천 기록</h3>
      <div id="historyList">불러오는 중...</div>
    </div>
  </div>

  <script>
    let audio;
    let sleepTimer;

    const recommendations = {
      stress: {
        label: "스트레스가 많음",
        music: "잔잔한 피아노 힐링 음악",
        habit: "명상 5분 후 조용히 눕기",
        url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
      },
      tired: {
        label: "매우 피곤함",
        music: "빗소리와 함께 듣는 앰비언트",
        habit: "가벼운 스트레칭 후 호흡 정리",
        url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
      },
      normal: {
        label: "보통 상태",
        music: "로파이 재즈 플레이리스트",
        habit: "휴대폰을 멀리 두고 조명 낮추기",
        url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
      }
    };

    function recommend(state) {
      const selected = recommendations[state];
      if (!selected) return;

      document.getElementById("result").innerHTML = `
        <h2>추천 결과</h2>
        <div class="summary">
          <p><strong>현재 상태</strong>: ${selected.label}</p>
          <p><strong>추천 음악</strong>: ${selected.music}</p>
          <p><strong>추천 습관</strong>: ${selected.habit}</p>
        </div>

        <div class="buttons">
          <button onclick="play('${selected.url}')">음악 재생</button>
          <button class="secondary" onclick="stopAudio()">음악 정지</button>
        </div>

        <p>수면 타이머(분)</p>
        <div class="timer-box">
          <input type="number" id="time" placeholder="10" min="1">
          <button onclick="timer()">설정</button>
        </div>

        <div class="buttons">
          <button onclick="saveRecommendation('${state}')">추천 저장</button>
          <button class="secondary" onclick="back()">다시 선택</button>
        </div>

        <div id="status" class="status"></div>
      `;
    }

    function play(url) {
      if (audio) audio.pause();
      audio = new Audio(url);
      audio.loop = true;
      audio.volume = 0.5;
      audio.play();
    }

    function stopAudio() {
      if (audio) audio.pause();
      if (sleepTimer) {
        clearTimeout(sleepTimer);
        sleepTimer = null;
      }
    }

    function timer() {
      const t = Number(document.getElementById("time").value);
      if (!audio || !t) return;

      if (sleepTimer) clearTimeout(sleepTimer);

      sleepTimer = setTimeout(() => {
        audio.pause();
        alert("설정한 시간이 지나 음악을 멈췄어요.");
      }, t * 60000);

      setStatus(`${t}분 뒤에 음악을 멈추도록 설정했어요.`);
    }

    function back() {
      stopAudio();
      document.getElementById("result").innerHTML = "";
    }

    function setStatus(message, isError = false) {
      const status = document.getElementById("status");
      if (!status) return;
      status.textContent = message;
      status.style.color = isError ? "#fca5a5" : "#94a3b8";
    }

    async function saveRecommendation(state) {
      const selected = recommendations[state];
      if (!selected) return;

      try {
        setStatus("DB에 저장하는 중...");
        const response = await fetch("/api/recommendations", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            state,
            stateLabel: selected.label,
            music: selected.music,
            habit: selected.habit
          })
        });

        if (!response.ok) {
          throw new Error("저장 요청 실패");
        }

        setStatus("추천 결과를 DB에 저장했어요.");
        loadHistory();
      } catch (error) {
        setStatus("저장에 실패했어요. 서버가 실행 중인지 확인해주세요.", true);
      }
    }

    async function loadHistory() {
      const historyList = document.getElementById("historyList");

      try {
        const response = await fetch("/api/recommendations");
        if (!response.ok) {
          throw new Error("조회 실패");
        }

        const items = await response.json();
        if (!items.length) {
          historyList.textContent = "아직 저장된 추천 기록이 없어요.";
          return;
        }

        historyList.innerHTML = items.map((item) => `
          <div class="history-item">
            <strong>${item.state_label}</strong>
            <div>${item.music}</div>
            <div>${item.habit}</div>
            <small>${formatDate(item.created_at)}</small>
          </div>
        `).join("");
      } catch (error) {
        historyList.textContent = "기록을 불러오지 못했어요. 서버를 먼저 실행해주세요.";
      }
    }

    function formatDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("ko-KR");
    }

    loadHistory();
  </script>
</body>
</html>
