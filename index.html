<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>불면증 해소기</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.app {
  width: 340px;
  height: 620px;
  background: #1e293b;
  border-radius: 25px;
  padding: 20px;
  color: white;
  overflow-y: auto;
}

.card {
  background: #334155;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  cursor: pointer;
}

button {
  margin-top: 10px;
  padding: 8px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  cursor: pointer;
}

input, textarea, select {
  width: 90%;
  margin-top: 10px;
  padding: 6px;
  border-radius: 8px;
  border: none;
}
</style>

</head>
<body>

<div class="app">

<h2>🌙 불면증 해소기</h2>

<div id="screen"></div>

</div>

<script>
let currentUser = null;
let audio;

// 🔐 시작 화면
showLogin();

// 회원가입 화면
function showRegister() {
  document.getElementById("screen").innerHTML = `
    <h3>회원가입</h3>
    <input id="regId" placeholder="아이디">
    <input id="regPw" type="password" placeholder="비밀번호">
    <button onclick="register()">가입하기</button>
    <button onclick="showLogin()">← 로그인</button>
  `;
}

// 로그인 화면
function showLogin() {
  document.getElementById("screen").innerHTML = `
    <h3>로그인</h3>
    <input id="loginId" placeholder="아이디">
    <input id="loginPw" type="password" placeholder="비밀번호">
    <button onclick="login()">로그인</button>
    <button onclick="showRegister()">회원가입</button>
  `;
}

// 회원가입 기능
function register() {
  let id = document.getElementById("regId").value;
  let pw = document.getElementById("regPw").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  if (users.find(u => u.id === id)) {
    alert("이미 존재하는 아이디");
    return;
  }

  users.push({id, pw});
  localStorage.setItem("users", JSON.stringify(users));

  alert("회원가입 성공!");
  showLogin();
}

// 로그인 기능
function login() {
  let id = document.getElementById("loginId").value;
  let pw = document.getElementById("loginPw").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let user = users.find(u => u.id === id && u.pw === pw);

  if (!user) {
    alert("로그인 실패");
    return;
  }

  currentUser = id;
  showHome();
}

// 🏠 홈 화면
function showHome() {
  document.getElementById("screen").innerHTML = `
    <h3>${currentUser}님 환영합니다 👋</h3>

    <div class="card" onclick="showRecommend()">😴 수면 추천</div>
    <div class="card" onclick="showMusic()">🎵 음악 선택</div>
    <div class="card" onclick="showConsult()">🧠 상담</div>
    <div class="card" onclick="showHistory()">📊 기록</div>

    <button onclick="logout()">로그아웃</button>
  `;
}

// 🔓 로그아웃
function logout() {
  currentUser = null;
  stop();
  showLogin();
}

// 😴 추천
function showRecommend() {
  document.getElementById("screen").innerHTML = `
    <h3>상태 선택</h3>
    <div class="card" onclick="recommend('stress')">스트레스</div>
    <div class="card" onclick="recommend('tired')">피곤함</div>
    <div class="card" onclick="recommend('normal')">보통</div>
    <button onclick="showHome()">← 홈</button>
  `;
}

function recommend(state) {
  let music = state === "stress" ? "피아노" : state === "tired" ? "빗소리" : "로파이";
  let habit = state === "stress" ? "명상" : state === "tired" ? "스트레칭" : "폰 끄기";

  saveData(state, music, habit);

  document.getElementById("screen").innerHTML = `
    <p>${music} / ${habit}</p>
    <button onclick="playDefault()">재생</button>
    <button onclick="showHome()">홈</button>
  `;
}

// 🎵 음악
function showMusic() {
  document.getElementById("screen").innerHTML = `
    <select id="music">
      <option value="1">피아노</option>
      <option value="2">빗소리</option>
      <option value="3">로파이</option>
    </select>
    <button onclick="playSelect()">재생</button>
    <button onclick="stop()">정지</button>
    <button onclick="showHome()">← 홈</button>
  `;
}

function playSelect() {
  let v = document.getElementById("music").value;
  let url = v==1?"https://www.soundhelix.com/examples/mp3/Song-1.mp3":
            v==2?"https://www.soundhelix.com/examples/mp3/Song-2.mp3":
            "https://www.soundhelix.com/examples/mp3/Song-3.mp3";
  play(url);
}

// 🧠 상담
function showConsult() {
  document.getElementById("screen").innerHTML = `
    <textarea id="text"></textarea>
    <button onclick="consult()">상담</button>
    <div id="res"></div>
    <button onclick="showHome()">← 홈</button>
  `;
}

function consult() {
  let t = document.getElementById("text").value;
  let r = t.includes("스트레스") ? "쉬어보세요 🌿" :
          t.includes("잠") ? "폰 줄이세요 📵" :
          "편안한 음악 추천 😌";
  document.getElementById("res").innerHTML = r;
}

// 📊 기록
function saveData(state, music, habit) {
  let all = JSON.parse(localStorage.getItem("records")) || {};
  if (!all[currentUser]) all[currentUser] = [];
  all[currentUser].push({state, music, habit, time:new Date().toLocaleString()});
  localStorage.setItem("records", JSON.stringify(all));
}

function showHistory() {
  let all = JSON.parse(localStorage.getItem("records")) || {};
  let data = all[currentUser] || [];

  let html = "<h3>기록</h3>";
  data.forEach(d => {
    html += `<div class="card">${d.state}/${d.music}/${d.time}</div>`;
  });

  document.getElementById("screen").innerHTML = html + `<button onclick="showHome()">← 홈</button>`;
}

// 🎵 재생
function play(url) {
  if (audio) audio.pause();
  audio = new Audio(url);
  audio.loop = true;
  audio.play();
}

function playDefault() {
  play("https://www.soundhelix.com/examples/mp3/Song-1.mp3");
}

function stop() {
  if (audio) audio.pause();
}
</script>

</body>
</html>
